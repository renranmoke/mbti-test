<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MBTI测试</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:40px;
}

.box{
max-width:700px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
margin-top:20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2 id="question">题目加载中...</h2>

<button onclick="answer('A')">A</button>
<button onclick="answer('B')">B</button>

</div>

<script>

let questions = [

["你更喜欢独处还是社交","I","E"],
["做决定时更依赖逻辑还是感觉","T","F"],
["你更喜欢计划还是随性","J","P"],
["你更关注现实还是想象","S","N"],
["社交后你会精力充沛还是疲惫","E","I"]

];

let index=0;

let score={
E:0,I:0,
S:0,N:0,
T:0,F:0,
J:0,P:0
};

function load(){

document.getElementById("question").innerText=
questions[index][0];

}

function answer(a){

if(a=="A"){

score[questions[index][1]]++;

}else{

score[questions[index][2]]++;

}

index++;

if(index>=questions.length){

result();

}else{

load();

}

}

function result(){

let type="";

type += score.E>score.I?"E":"I";
type += score.S>score.N?"S":"N";
type += score.T>score.F?"T":"F";
type += score.J>score.P?"J":"P";

localStorage.setItem("mbti",type);

window.location.href="result.html";

}

load();

</script>

</body>
</html>
