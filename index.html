<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>16人格测评入口</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding-top:100px;
}

.box{
background:white;
width:320px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{

}

<body>

<div class="box">

<h2>16人格·心智阶位测评</h2>

<p>请输入邀请码进入测试</p>

<input id="code" placeholder="请输入邀请码">

<button onclick="check()">进入测试</button>

</div>

<script>

function check(){

var code=document.getElementById("code").value;

if(code=="VIP2024"){

window.location.href="test.html";

}else{

alert("邀请码错误");

}

}

</script>
